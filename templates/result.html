<!DOCTYPE html>
<html>
<head>
    <title>Resume Analysis Dashboard</title>
</head>

<body style="margin:0; font-family: Arial;">

<div style="display:flex; height:100vh;">

    <!-- LEFT SIDE: RESUME PREVIEW -->
    <div style="width:60%; border-right:2px solid #ddd;">
        <iframe 
            src="/uploads/{{ filename }}" 
            width="100%" 
            height="100%" 
            style="border:none;">
        </iframe>
    </div>

    <!-- RIGHT SIDE: ATS DASHBOARD -->
    <div style="width:40%; padding:20px; overflow:auto;">

        <h1>📊 ATS Dashboard</h1>

        <!-- ATS SCORE -->
        <h2 style="color:green;">ATS Score: {{ score }}/100</h2>

        <!-- JOB ROLE -->
        <h2 style="color:purple;">🎯 Job Role: {{ job_role }}</h2>

        <hr>

        <!-- FOUND SKILLS -->
        <h3 style="color:green;">✅ Found Skills</h3>
        <ul>
            {% for skill in found_skills %}
                <li style="color:green;">{{ skill }}</li>
            {% endfor %}
        </ul>

        <hr>

        <!-- MISSING SKILLS -->
        <h3 style="color:red;">❌ Missing Skills</h3>
        <ul>
            {% for skill in missing_skills %}
                <li style="color:red;">{{ skill }}</li>
            {% endfor %}
        </ul>

        <hr>

        <!-- SUGGESTIONS -->
        <h3>💡 Suggestions</h3>
        <p>{{ suggestions }}</p>

        <hr>

        <!-- BACK BUTTON -->
        <a href="/">
            <button style="padding:10px 15px; font-size:16px;">
                🔙 Upload Another Resume
            </button>
        </a>

    </div>

</div>

</body>
</html>
